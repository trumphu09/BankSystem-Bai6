name: Auto Code Review Bot

# CHỈ KÍCH HOẠT KHI CÓ PULL REQUEST VÀO NHÁNH MAIN
on:
  pull_request:
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Cấp quyền cho Bot được phép viết Comment vào PR

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Bot soi lỗi Checkstyle và comment trực tiếp vào dòng code sai
    - name: Run Checkstyle & Post Comments
      uses: reviewdog/action-checkstyle@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review 
        level: warning